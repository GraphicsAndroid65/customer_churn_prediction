<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn AI Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Advanced Animated Background -->
    <div class="mesh-bg">
        <div class="blob-shape blob-1"></div>
        <div class="blob-shape blob-2"></div>
        <div class="blob-shape blob-3"></div>
    </div>

    <div class="container">
        <!-- Dashboard Section -->
        <div class="glass-panel main-panel">
            <header>
                <h1>Churn Analytics <span class="badge ml-badge">Live ML API</span></h1>
                <p>Harness the power of Random Forest AI to predict customer retention probability in real time.</p>
            </header>

            <form id="churn-form">
                <div class="input-grid">
                    <div class="input-group">
                        <label for="tenure">Tenure (Months)</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📅</span>
                            <input type="number" id="tenure" name="tenure" min="0" max="100" value="12" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="monthly-charges">Monthly Charges ($)</label>
                        <div class="input-wrapper">
                            <span class="input-icon">💵</span>
                            <input type="number" id="monthly-charges" name="monthlyCharges" min="0" step="0.01" value="50.0" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="total-contacts">Support Interactions</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📞</span>
                            <input type="number" id="total-contacts" name="totalContacts" min="0" max="50" value="2" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="support-tickets">Open Tickets</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🎫</span>
                            <input type="number" id="support-tickets" name="supportTickets" min="0" max="20" value="1" required>
                        </div>
                    </div>
                </div>

                <div class="input-group contract-group">
                    <label>Contract Type</label>
                    <div class="radio-group">
                        <label class="radio-card">
                            <input type="radio" name="contractType" value="0" checked>
                            <div class="card-content">
                                <span class="icon">📝</span>
                                <span class="title">Monthly</span>
                            </div>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="contractType" value="1">
                            <div class="card-content">
                                <span class="icon">🗓️</span>
                                <span class="title">1 Year</span>
                            </div>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="contractType" value="2">
                            <div class="card-content">
                                <span class="icon">📆</span>
                                <span class="title">2 Years</span>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="primary-btn">
                    <span class="btn-text">Generate Prediction</span>
                    <div class="spinner loader"></div>
                </button>
            </form>
        </div>

        <!-- Result Section -->
        <div class="glass-panel result-panel fade-out" id="result-panel">
            <h2>AI Prediction</h2>
            <div class="result-display">
                <div class="gauge-container">
                    <svg viewBox="0 0 100 50" class="gauge">
                        <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke-width="12"/>
                        <path class="gauge-value" id="gauge-path" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke-width="12" stroke-dasharray="125" stroke-dashoffset="125"/>
                    </svg>
                    <div class="gauge-label"><span id="probability-text">0</span><span class="percent-sign">%</span></div>
                </div>
                <h3 id="churn-status-text">Analyzing...</h3>
                <p id="churn-details" class="details-text">Awaiting input data.</p>
            </div>
            
            <div class="firebase-footer">
                &#9889; Hosted on Google Firebase
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
